    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;

    height: 6px;
    border-radius: 50%;

    box-shadow: 0 0 8px var(--green);

  @keyframes pulse {

    background: var(--bg2);

  .tabs {

    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px;

    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text2);
    cursor: pointer;
    border-radius: 4px;

    background: transparent;

  }
</style>

// ─── CORS PROXY ───────────────────────────────────────────────────────────────

const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

let activeProxy = 0;

async function fetchWithProxy(url) {
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyIdx = (activeProxy + i) % PROXIES.length;
    try {
      const proxied = PROXIES[proxyIdx](url);
      const res = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      activeProxy = proxyIdx;
      return data;
    } catch (e) {
      if (i === PROXIES.length - 1) throw e;
    }
  }
}

// ─── YAHOO FINANCE ────────────────────────────────────────────────────────────

const YF_BASE = 'https://query2.finance.yahoo.com';

async function fetchQuotes(symbols) {
  const url = `${YF_BASE}/v7/finance/quote?symbols=${symbols.join(',')}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketPreviousClose,shortName,longName`;
  const data = await fetchWithProxy(url);
  const result = {};
  const quotes = data?.quoteResponse?.result || [];
  for (const q of quotes) {
    result[q.symbol] = {
      price: q.regularMarketPrice,
      changePercent: q.regularMarketChangePercent,
      prevClose: q.regularMarketPreviousClose,
      name: q.shortName || q.longName || q.symbol,
    };
  }
  return result;
}

async function fetchHistory(symbol, range) {
  // range: '5d', '1mo', 'ytd'
  const url = `${YF_BASE}/v8/finance/chart/${symbol}?range=${range}&interval=1d`;
  const data = await fetchWithProxy(url);
  const closes = data?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
  return closes || [];
}

function calcChangeFromHistory(closes) {
  if (!closes || closes.length < 2) return null;
  const valid = closes.filter(v => v != null);
  if (valid.length < 2) return null;
  const first = valid[0];
  const last = valid[valid.length - 1];
  return ((last - first) / first) * 100;
}

  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';

function pctClass(v) {
  if (v == null) return 'flat';
  if (v > 0.05) return 'pos';
  if (v < -0.05) return 'neg';

function barWidth(v, max = 5) {
  if (v == null) return 0;
  return Math.min(Math.abs(v) / max * 100, 100);
}

function tvLink(symbol) {
  // Guess exchange
  const nasdaq = ['NVDA','AMD','MSFT','GOOGL','AMZN','META','AAPL','AVGO','QCOM','AMAT','MU','INTC','ASML',
    'PANW','CRWD','FTNT','ZS','OKTA','IONQ','RGTI','QBTS','QUBT','ISRG','JOBY','ACHR','MELI','CHWY',
    'SMCI','DELL','CYBR','IRBT','BRKS','NNDM','MKFG','RCAT','ONDS','AVAV','KTOS','SPCE','ASTR','MNTS','BARK','BURL',
    'CCJ','NXE','UEC','UUUU','DNN','URG','SMR','MP','ALB','LAC','SGML','IRDM','RKT','VSAT','HII','UMAC','EQNR','BBWI','GME'];
  const nyse = ['LMT','RTX','NOC','GD','BA','LDOS','NEE','AES','ED','ETR','SO','DUK','EXC','PCG','NEM','AEM','GOLD','WPM','KGC',
    'FCX','SCCO','TECK','HBM','AGI','OR','NGD','PAAS','CDE','HL','SSRM','FSM','SILV','WMT','TGT','AMZN',
    'IBM','MSFT','GOOGL','COST','RL','TPR','RH','PVH','CPRI','HON','CMMC','ERO','MAXR','PLAG','NOVN','L3H','HPE','PCG'];
  const ex = nasdaq.includes(symbol) ? 'NASDAQ' : 'NYSE';
  return `https://www.tradingview.com/chart/?symbol=${ex}%3A${symbol}`;
}

function renderGrid() {
  const grid = document.getElementById('themeGrid');
  const categories = [...new Set(THEMES.map(t => t.category))];

  let html = '';
  for (const cat of categories) {
    html += `<div class="category-header">${cat}</div>`;
    const catThemes = THEMES.filter(t => t.category === cat);
    for (const theme of catThemes) {
      const data = perfData[theme.id];
      const etfPct = data?.etf;
      const cls = etfPct != null ? pctClass(etfPct) : 'loading';
      const pctStr = etfPct != null ? fmtPct(etfPct) : '···';
      const bw = barWidth(etfPct);

      // Top 2 movers from holdings
      let moversHtml = '';
      if (data?.holdings) {
        const pairs = Object.entries(data.holdings)
          .filter(([,v]) => v != null)
          .sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]))
          .slice(0, 3);
        moversHtml = pairs.map(([sym, pct]) => {
          const mc = pctClass(pct);
          return `<span class="mover-chip ${mc}">${sym} ${fmtPct(pct)}</span>`;
        }).join('');
      }

      html += `
        <div class="theme-card" data-id="${theme.id}" style="--card-color:${theme.color}">
          <div class="card-header">
            <div>
              <div class="theme-name">${theme.name}</div>
              <div class="etf-ticker">${theme.etf} · ${currentTf}</div>
            </div>
            <div class="perf-badge ${cls}">${pctStr}</div>
          </div>
          <div class="perf-bar">
            <div class="perf-bar-fill ${cls}" style="width:${bw}%"></div>
          </div>
          <div class="card-footer">
            <div class="top-movers">${moversHtml || '<span style="font-size:9px;color:var(--text3)">loading holdings···</span>'}</div>
            <div class="expand-hint">DRILL DOWN ↗</div>
          </div>
        </div>`;
    }
  }
  grid.innerHTML = html;

  // Attach click handlers
  grid.querySelectorAll('.theme-card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

function updateStatusBar() {
  document.getElementById('statusLoaded').textContent = loadedCount;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────

let currentModalTheme = null;

function openModal(themeId) {
  const theme = THEMES.find(t => t.id === themeId);
  if (!theme) return;
  currentModalTheme = theme;

  document.getElementById('modalTitle').textContent = theme.name;
  document.getElementById('modalSubtitle').textContent = `${theme.etf} · ${theme.holdings.length} holdings · ${currentTf}`;
  document.getElementById('modalEtfLabel').textContent = theme.etf;

  const etfPct = perfData[themeId]?.etf;
  const etfEl = document.getElementById('modalEtfPct');
  etfEl.textContent = etfPct != null ? fmtPct(etfPct) : '—';
  etfEl.className = 'modal-etf-pct ' + pctClass(etfPct);

  document.getElementById('modalEtfTvLink').href = tvLink(theme.etf);

  renderHoldings(theme);
  document.getElementById('modalOverlay').classList.add('open');
}

function renderHoldings(theme) {
  const table = document.getElementById('holdingsTable');
  const holdingsData = perfData[theme.id]?.holdings || {};

  // Sort by absolute pct change (loading ones go to bottom)
  const sorted = [...theme.holdings]
    .map(sym => ({ sym, pct: holdingsData[sym] ?? null }))
    .sort((a, b) => {
      if (a.pct == null && b.pct == null) return 0;
      if (a.pct == null) return 1;
      if (b.pct == null) return -1;
      return b.pct - a.pct; // highest first (best performers at top)
    });

  const maxAbs = Math.max(...sorted.filter(x => x.pct != null).map(x => Math.abs(x.pct)), 1);

  let html = '';
  sorted.forEach(({ sym, pct }, i) => {
    const cls = pct != null ? pctClass(pct) : 'loading';
    const pctStr = pct != null ? fmtPct(pct) : '···';
    const bw = pct != null ? (Math.abs(pct) / maxAbs * 100) : 0;
    const price = perfData[theme.id]?.prices?.[sym];
    const priceStr = price != null ? `$${price.toFixed(price >= 100 ? 2 : 3)}` : '—';

    html += `
      <a class="holding-row" href="${tvLink(sym)}" target="_blank" rel="noopener">
        <div class="holding-rank">#${i + 1}</div>
        <div class="holding-info">
          <div class="holding-ticker">${sym}</div>
          <div class="holding-bar"><div class="holding-bar-fill ${cls}" style="width:${bw}%"></div></div>
        </div>
        <div class="holding-price">${priceStr}</div>
        <div class="holding-pct ${cls}">${pctStr}</div>
      </a>`;
  });

  table.innerHTML = html;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  currentModalTheme = null;
}

document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── DATA LOADING ─────────────────────────────────────────────────────────────

const TF_RANGE = { '1D': null, '5D': '5d', '1M': '1mo', 'YTD': 'ytd' };

async function loadTheme(theme) {
  const allSymbols = [theme.etf, ...theme.holdings];

  try {
    if (currentTf === '1D') {
      // Use v7 quote for 1-day change
      const quotes = await fetchQuotes(allSymbols);

      if (!perfData[theme.id]) perfData[theme.id] = { etf: null, holdings: {}, prices: {} };
      const d = perfData[theme.id];

      d.etf = quotes[theme.etf]?.changePercent ?? null;
      for (const sym of theme.holdings) {
        d.holdings[sym] = quotes[sym]?.changePercent ?? null;
        d.prices[sym] = quotes[sym]?.price ?? null;
      }
    } else {
      // Historical range
      const range = TF_RANGE[currentTf];
      if (!perfData[theme.id]) perfData[theme.id] = { etf: null, holdings: {}, prices: {} };
      const d = perfData[theme.id];

      // Fetch ETF history
      const etfCloses = await fetchHistory(theme.etf, range);
      d.etf = calcChangeFromHistory(etfCloses);

      // Fetch each holding (staggered to avoid rate limits)
      for (let i = 0; i < theme.holdings.length; i++) {
        const sym = theme.holdings[i];
        try {
          if (i > 0) await sleep(120);
          const closes = await fetchHistory(sym, range);
          d.holdings[sym] = calcChangeFromHistory(closes);
        } catch {
          d.holdings[sym] = null;
        }
        // Re-render modal if open
        if (currentModalTheme?.id === theme.id) renderHoldings(theme);
      }
    }
  } catch (e) {
    if (!perfData[theme.id]) perfData[theme.id] = { etf: null, holdings: {}, prices: {} };
    perfData[theme.id].etf = null;
    console.warn(`Failed to load ${theme.id}:`, e.message);
  }

  loadedCount++;
  updateStatusBar();
  renderGrid();
  if (currentModalTheme?.id === theme.id) renderHoldings(theme);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function loadAll() {
  loadedCount = 0;
  updateStatusBar();
  renderGrid();

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('loading');

  // For 1D, batch all symbols into one quote call per theme (faster)
  // Load themes in parallel batches of 4
  const batchSize = currentTf === '1D' ? 8 : 2;

  for (let i = 0; i < THEMES.length; i += batchSize) {
    const batch = THEMES.slice(i, i + batchSize);
    await Promise.all(batch.map(t => loadTheme(t)));
    if (currentTf !== '1D') await sleep(300);
  }

  btn.classList.remove('loading');
  document.getElementById('lastUpdate').textContent =
    'UPDATED ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ─── TIMEFRAME TABS ───────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTf = tab.dataset.tf;
    // Clear data for new timeframe
    for (const key of Object.keys(perfData)) delete perfData[key];
    loadAll();
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  for (const key of Object.keys(perfData)) delete perfData[key];
  loadAll();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────

renderGrid(); // skeleton render
loadAll();

</script>
