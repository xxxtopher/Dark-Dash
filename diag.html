<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Finviz Diagnostic</title>
<style>body{background:#0d1117;color:#c8d8e8;font-family:monospace;padding:20px;font-size:12px}
.ok{color:#00e676}.fail{color:#ff4444}.warn{color:#ffd700}
button{background:#1e2a38;color:#c8d8e8;border:1px solid #253040;padding:8px 16px;cursor:pointer;font-family:monospace;margin:4px;font-size:12px}
pre{background:#131920;padding:8px;border-radius:4px;white-space:pre-wrap;word-break:break-all;font-size:10px;max-height:300px;overflow-y:auto}
</style></head>
<body>
<h2 style="color:#00b4ff">Finviz Scraping Diagnostic</h2>
<button onclick="testRaw()">1. Fetch raw Finviz HTML for ONDS</button>
<button onclick="testParse()">2. Parse news rows from HTML</button>
<button onclick="testMulti()">3. Test 5 symbols</button>
<div id="out"></div>
<script>
const WORKER = 'https://yahoo-proxy.topherho.workers.dev';
const log = (msg, cls='') => { document.getElementById('out').innerHTML += '<div class="'+cls+'">'+msg+'</div>'; };
const logPre = (msg) => { document.getElementById('out').innerHTML += '<pre>'+msg+'</pre>'; };

async function fetchFinviz(sym) {
  const url = `https://finviz.com/quote.ashx?t=${sym}&p=d`;
  const res = await fetch(`${WORKER}?url=${encodeURIComponent(url)}`, {signal: AbortSignal.timeout(10000)});
  return await res.text();
}

async function testRaw() {
  log('<br>--- Fetching raw Finviz HTML for ONDS ---');
  try {
    const html = await fetchFinviz('ONDS');
    log(`✓ Got ${html.length} bytes`, 'ok');
    // Check if it's a real page or blocked
    if (html.includes('news-table') || html.includes('news_date')) {
      log('✓ Found news table in HTML', 'ok');
    } else if (html.includes('captcha') || html.includes('robot') || html.includes('blocked')) {
      log('✗ Blocked by Finviz (captcha/robot detected)', 'fail');
    } else {
      log('⚠ Page loaded but no news table found', 'warn');
      log('First 500 chars of response:');
      logPre(html.slice(0, 500));
    }
    // Show a snippet around "news"
    const idx = html.toLowerCase().indexOf('news');
    if (idx > 0) {
      log('HTML around first "news" occurrence:');
      logPre(html.slice(Math.max(0,idx-100), idx+500));
    }
  } catch(e) { log('✗ Error: '+e.message, 'fail'); }
}

async function testParse() {
  log('<br>--- Parsing news rows from Finviz HTML ---');
  try {
    const html = await fetchFinviz('ONDS');
    // Try multiple parsing strategies
    // Strategy 1: news-table id
    const t1 = html.match(/id="news-table"[\s\S]*?<\/table>/i)?.[0] ?? '';
    log(`Strategy 1 (id=news-table): ${t1.length} chars`);

    // Strategy 2: find all <tr> with date-like content
    const rows = [...html.matchAll(/<tr[^>]*>([\s\S]*?)<\/tr>/gi)];
    const newsRows = rows.filter(r => r[1].includes('finviz.com') || r[1].match(/\d+:\d+[AP]M/));
    log(`Strategy 2 (tr with time/finviz): ${newsRows.length} rows`);
    if (newsRows.length > 0) {
      log('Sample row:');
      logPre(newsRows[0][1].slice(0, 300));
    }

    // Strategy 3: find all links with news-like hrefs
    const links = [...html.matchAll(/<a[^>]+href="([^"]*finviz\.com\/news[^"]*|https?:\/\/[^"]+)"[^>]*>([^<]{10,})<\/a>/gi)];
    log(`Strategy 3 (news links): ${links.length} links`);
    links.slice(0,3).forEach(l => log(`  → ${l[2].slice(0,80)} | ${l[1].slice(0,60)}`));

    // Show the actual news table if found
    if (t1) {
      log('News table HTML snippet:');
      logPre(t1.slice(0, 800));
    }
  } catch(e) { log('✗ Error: '+e.message, 'fail'); }
}

async function testMulti() {
  log('<br>--- Testing 5 symbols ---');
  const syms = ['ONDS','KTOS','MU','RKLB','AMAT'];
  for (const sym of syms) {
    try {
      const html = await fetchFinviz(sym);
      const hasTable = html.includes('news-table') || html.includes('news_date');
      const linkCount = (html.match(/finviz\.com\/news\//g) || []).length;
      log(`${sym}: ${html.length} bytes, news-table=${hasTable}, finviz-news-links=${linkCount}`, hasTable||linkCount>0?'ok':'warn');
    } catch(e) { log(`${sym}: ✗ ${e.message}`, 'fail'); }
  }
}
</script>
</body>
</html>
