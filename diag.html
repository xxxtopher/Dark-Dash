<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Rate Limit Diagnostic</title>
<style>body{background:#0d1117;color:#c8d8e8;font-family:monospace;padding:20px;font-size:12px}
.ok{color:#00e676}.fail{color:#ff4444}.warn{color:#ffd700}
button{background:#1e2a38;color:#c8d8e8;border:1px solid #253040;padding:8px 16px;cursor:pointer;font-family:monospace;margin:4px 2px;font-size:12px}
</style></head>
<body>
<h2 style="color:#00b4ff">Rate Limit Diagnostic</h2>
<p style="color:#6a8aa0">Run these IN ORDER, wait for each to finish before clicking next.</p>
<button onclick="test1()">Test 1: 30 sequential, no delay</button>
<button onclick="test2()">Test 2: 30 sequential, 1s delay</button>
<button onclick="test3()">Test 3: 30 sequential, 2s delay</button>
<button onclick="test4()">Test 4: How long to recover? (wait 60s then retry)</button>
<div id="out"></div>
<script>
const log = (msg, cls='') => { document.getElementById('out').innerHTML += '<div class="'+cls+'">'+msg+'</div>'; };
const PROXY = u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u);
const YF = sym => 'https://query2.finance.yahoo.com/v8/finance/chart/'+sym+'?range=1d&interval=1d';
const SYMS = ['URNM','REMX','COPX','GRID','XOP','SMH','AIQ','HACK','QTUM','BOTZ','BKCH','IGV','PRNT','CLOD','ITA','DRNZ','UFO','GDX','SIL','XRT','GLUX','XLP','AWAY','XBI','XLF','KBWP','MU','AMAT','KLAC','NVDA'];

async function fetchSym(sym) {
  try {
    const res = await fetch(PROXY(YF(sym)), {signal: AbortSignal.timeout(8000)});
    if (!res.ok) return null;
    const text = await res.text();
    if (!text || text.length < 50) return null;
    return JSON.parse(text)?.chart?.result?.[0]?.meta?.regularMarketPrice ?? null;
  } catch(e) { return null; }
}

async function runSequential(delayMs, label) {
  log(`<br>--- ${label} ---`);
  let ok=0, fail=0;
  const t0 = Date.now();
  for (let i=0; i<SYMS.length; i++) {
    const sym = SYMS[i];
    if (delayMs > 0) await new Promise(r => setTimeout(r, delayMs));
    const price = await fetchSym(sym);
    const elapsed = ((Date.now()-t0)/1000).toFixed(1);
    if (price) { ok++; log(`  ✓ [${String(i+1).padStart(2)}] ${sym} $${price} (${elapsed}s)`, 'ok'); }
    else        { fail++; log(`  ✗ [${String(i+1).padStart(2)}] ${sym} FAILED (${elapsed}s)`, 'fail'); }
  }
  log(`Result: ${ok}/30 ok in ${((Date.now()-t0)/1000).toFixed(1)}s`, ok===30?'ok':'warn');
}

async function test1() { await runSequential(0,   '30 sequential, no delay'); }
async function test2() { await runSequential(1000, '30 sequential, 1s delay between each'); }
async function test3() { await runSequential(2000, '30 sequential, 2s delay between each'); }

async function test4() {
  log('<br>--- Waiting 60 seconds for rate limit to reset... ---', 'warn');
  for (let i=60; i>0; i--) {
    await new Promise(r => setTimeout(r, 1000));
    if (i % 10 === 0) log(`  ${i}s remaining...`);
  }
  log('  Retrying 10 symbols...');
  let ok=0;
  for (const sym of SYMS.slice(0,10)) {
    const price = await fetchSym(sym);
    if (price) { ok++; log(`  ✓ ${sym} $${price}`, 'ok'); }
    else        { log(`  ✗ ${sym} failed`, 'fail'); }
  }
  log(`After 60s wait: ${ok}/10 ok`, ok===10?'ok':'warn');
}
</script>
</body>
</html>
